name: AI Orchestrator Runner

on:
  push:
    branches: [ main ]

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: System Analysis by Gemini SDK
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "======================================================="
          echo "🤖 STARTING GLOBAL LEGACY CODE SCANNING WITH SDK..."
          echo "======================================================="
          
          # 1. ติดตั้งไลบรารีทางการของ Google
          npm install @google/generative-ai
          
          # 2. สร้างและรันสคริปต์สแกนเนอร์ผ่าน Node.js
          node -e "
            const { GoogleGenAI } = require('@google/generative-ai');
            
            async function main() {
              try {
                // สำหรับ SDK ตัวใหม่ล่าสุดจะใช้โครงสร้างระบุ API Key ผ่าน Environment Variable หรือตัวแปรตรง
                const ai = new GoogleGenAI({ apiKey: process.env.GEMINI_API_KEY });
                
                const response = await ai.models.generateContent({
                  model: 'gemini-1.5-flash',
                  contents: 'คุณคือสถาปนิกซอฟต์แวร์มืออาชีพ (Software Architect) จงวิเคราะห์และสรุปแนวทางการปรับโครงสร้างจากโปรเจกต์นี้ ซึ่งประกอบไปด้วยโฟลเดอร์ api, controllers, routes, prisma, และ middlewares แนะนำแนวทางการจัดกลุ่มโฟลเดอร์ใหม่ให้เป็นระเบียบตามมาตรฐานสากล (เช่น Clean Architecture หรือ Module-based) สรุปออกมาเป็นข้อๆ และร่างไดอะแกรมโครงสร้างใหม่ที่แนะนำมาให้ดูด้วย',
                });
                
                console.log('=======================================================');
                console.log('🏗️ BLUEPRINT REPORT FROM GEMINI ARCHITECT:');
                console.log('=======================================================');
                console.log(response.text);
              } catch (error) {
                console.error('SDK Execution Error:', error);
              }
            }
            
            main();
          "