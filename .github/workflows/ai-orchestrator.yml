name: AI Orchestrator Runner

on:
  push:
    branches: [ main ]

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: System Analysis by Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "======================================================="
          echo "🤖 STARTING GLOBAL LEGACY CODE SCANNING..."
          echo "======================================================="
          
          # ปรับตำแหน่ง Endpoint เป็น v1beta และใช้ชื่อโมเดลมาตรฐานระดับสากล
          curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "contents": [{
                "parts": [{
                  "text": "คุณคือสถาปนิกซอฟต์แวร์มืออาชีพ (Software Architect) จงวิเคราะห์และสรุปแนวทางการปรับโครงสร้างจากโปรเจกต์นี้ ซึ่งประกอบไปด้วยโฟลเดอร์ api, controllers, routes, prisma, และ middlewares แนะนำแนวทางการจัดกลุ่มโฟลเดอร์ใหม่ให้เป็นระเบียบตามมาตรฐานสากล (เช่น Clean Architecture หรือ Module-based) สรุปออกมาเป็นข้อๆ และร่างไดอะแกรมโครงสร้างใหม่ที่แนะนำมาให้ดูด้วย"
                }]
              }]
            }' > gemini_response.json

          node -e "
            const fs = require('fs');
            try {
              const res = JSON.parse(fs.readFileSync('gemini_response.json', 'utf8'));
              if (res.error) {
                console.log('API Error:', res.error.message);
              } else {
                console.log(res.candidates[0].content.parts[0].text);
              }
            } catch(e) {
              console.log('Error parsing response, displaying raw production logs.');
              console.log(fs.readFileSync('gemini_response.json', 'utf8'));
            }
          "