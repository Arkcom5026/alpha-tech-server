name: AI Orchestrator Runner

on:
  push:
    branches: [ main ]

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute System Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npm install @google/generative-ai
          # สั่งรันไฟล์สคริปต์ตรง ๆ ปลอดภัยจากปัญหา syntax ของ terminal
          node scripts/ai-scanner.js